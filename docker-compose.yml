services:
  postgres:
    image: postgres:15
    container_name: agro_score_postgres
    restart: always
    environment:
      POSTGRES_DB: agro_score
      POSTGRES_USER: agro_user
      POSTGRES_PASSWORD: agro_password
    ports:
      - "5434:5432"
    volumes:
      - agro_score_postgres_data:/var/lib/postgresql/data

volumes:
  agro_score_postgres_data: